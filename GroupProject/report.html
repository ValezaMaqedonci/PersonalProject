<h1>Report An Issue</h1>

<p>
Found a problem? Tell us and we will try to fix it.
</p><br>

<input type="text" id="name" placeholder="Your Name" width="200px" height="50px">

<input type="email" id="email" placeholder="Your Email" width="200px" height="50px">

<br><br>

<select id="problem">

    <br>

<option>
Choose Issue Type
</option>

<option>

</option>

<option>

</option>

<option>
Booking Problem
</option>

<option>

</option>

</select><br><br>

<h3>Issue Priority</h3>

<select id="priority">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
</select>

<br><br>

<textarea 
id="issue"
placeholder="Describe the problem...">
</textarea>

<br>

<button id="reportBtn">

Send Report

</button>

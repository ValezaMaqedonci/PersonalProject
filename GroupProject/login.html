<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login/Sign Up</title>

    <style>
body{

    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background: #170da8;
    font-family:'Segoe UI',sans-serif;

}

#login-page{

    width:400px;
    background:white;
    color:#333;
    padding:45px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
    text-align:center;

}

#login-page h1{

    color:#170da8;
    margin-bottom:10px;

}

#login-page p{

    color:#666;
    margin-bottom:25px;
    font-size:20px;

}

#login-page label{

    display:block;
    text-align:left;
    font-weight:bold;
    margin:15px 0 8px;

}

#login-page input{

    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;

}

#login-page input:focus{

    outline:none;
    border-color:#170da8;

}

#login-page #loginBtn{

    width:100%;
    margin-top:25px;
    text-decoration:none;
    padding:20px 130px;
    border:none;
    border-radius:10px;
    background:#170da8;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;

}

#login-page #loginBtn:hover{

    background:#ff9800;
    transform:translateY(-2px);

}

.signup{

    margin-top:20px;

}

.signup a{

    color:#170da8;
    text-decoration:underline;
    font-weight:bold;

}

.signup a:hover{

    text-decoration:underline;

}
    </style>
</head>
<body>

<div id="login-page">

    <p>Log in or Sign Up</p>

    <form action="login.php" method="post">

        <label for="username">Username</label>

        <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            required>

        <label for="password">Password</label>

        <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required><br><br><br>

        <a type="submit" href="index.html" id="loginBtn">
            Log In
        </a><br><br>

    </form>

    <p class="signup">
        Don't have an account?
        <a href="signup.html">Sign Up</a>
    </p>

</div>

<script src="main.js"></script>
</body>
</html>
